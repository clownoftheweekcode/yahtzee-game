<!DOCTYPE html>
<html>
    <head>
        <link rel = "stylesheet" href = "style.css">
    </head>
    <body>
        <style>
            .diceRoll {
    width:550px;
    height:50px;
}
.board {
    background-color:#f5dd9f;
    height:75px;
    width:400px;
    border-radius:5px;
}
html {
    background-color:#effacd;
}
.controls button {
    background-color:gray;
    border: 2px lightgray solid;
    border-radius: 5px;
    padding:15px 25px;

}
#content {
    width:500px;
    height:500px;
}
#content div, #content table {
    text-align:center;
    margin:auto;
}

.row {
    width:400px;
}

tr {
    display:inline-block;
    border:2px solid black;
    background-color:white;
}

td {
    width:25px;
}
.choiceP {
    border-right:2px solid black;
}

#row2 tr .choiceP {
    height:38px;
}

.diceRoll div {
    display:inline-block;
    width:30px;
    height:30px;
    margin:0px;
    border:2px solid black;
}
.held {
    background-color:lightgray;
}
.free {
    background-color:white;
}

.diceRoll {
    max-width:500px;
}
        </style>
        <div class = "choices">
            <table>
                <tbody class = "row">
                    <tr class = "choice"><td class = "choiceP">1<td class = "choiceScoreP" id = "1Score"></td></tr>
                    <tr class = "choice"><td class = "choiceP">2<td class = "choiceScoreP" id = "2Score"></td></tr>
                    <tr class = "choice"><td class = "choiceP">3<td class = "choiceScoreP" id = "3Score"></td></tr>
                    <tr class = "choice"><td class = "choiceP">4<td class = "choiceScoreP" id = "4Score"></td></tr>
                    <tr class = "choice"><td class = "choiceP">5<td class = "choiceScoreP" id = "5Score"></td></tr>
                    <tr class = "choice"><td class = "choiceP">6<td class = "choiceScoreP" id = "6Score"></td></tr>
                </tbody>
            </table>
            <table class = "row" id = "row2">
                <tbody class = "row">
                    <tr class = "choice"><td class = "choiceP">3 kind<td class = "choiceScoreP" id = "3Kind"></td></tr>
                    <tr class = "choice"><td class = "choiceP">4 kind<td class = "choiceScoreP" id = "4Kind"></td></tr>
                    <tr class = "choice"><td class = "choiceP">full house<td class = "choiceScoreP" id = "fullHouse"></td></tr>
                    <tr class = "choice"><td class = "choiceP">small str.<td class = "choiceScoreP" id = "smallStr"></td></tr>
                    <tr class = "choice"><td class = "choiceP">large str.<td class = "choiceScoreP" id = "largeStr"></td></tr>
                    <tr class = "choice"><td class = "choiceP">chance<td class = "choiceScoreP" id = "chance"></td></tr>
                </tbody>
            </table>
        </div>
        <div class = "board">

        </div>
        <div class = "diceRoll">
            <div onclick = "hold(this)" id = "dice1" class = "1 free"></div>
            <div onclick = "hold(this)" id = "dice2" class = "2 free"></div>
            <div onclick = "hold(this)" id = "dice3" class = "3 free"></div>
            <div onclick = "hold(this)" id = "dice4" class = "4 free"></div>
            <div onclick = "hold(this)" id = "dice5" class = "5 free"></div>
        </div>
        <div class = "controls">
            <button onclick = "roll()">roll</button>
            <p id = "rollsNum">rolls: 3</p>
        </div>
        <script src = "script.js"></script>
    </body>
</html>
