<!DOCTYPE html>
<html>
    <head>
        <link rel = "stylesheet" href = "style.css">
    </head>
    <body>
        <div id = "content">
            <div class = "choices">
                <table>
                    <tbody class= "row">
                            <tr class = "choice"><td class = "choiceP">1</td><td class = "choiceScoreP" id = "1Score"></td></tr>
                            <tr class = "choice"><td class = "choiceP">2</td><td class = "choiceScoreP" id = "2Score"></td></tr>
                            <tr class = "choice"><td class = "choiceP">3</td><td class = "choiceScoreP" id = "3Score"></td></tr>
                            <tr class = "choice"><td class = "choiceP">4</td><td class = "choiceScoreP" id = "4Score"></td></tr>
                            <tr class = "choice"><td class = "choiceP">5</td><td class = "choiceScoreP" id = "5Score"></td></tr>
                            <tr class = "choice"><td class = "choiceP">6</td><td class = "choiceScoreP" id = "6Score"></td></tr>
                    </tbody>
                </table>
                <table>
                    <tbody class = "row" id = "row2">
                            <tr class = "choice"><td class = "choiceP">3 kind</td><td class = "choiceScoreP" id = "3Kind"></td></tr>
                            <tr class = "choice"><td class = "choiceP">4 kind</td><td class = "choiceScoreP" id = "4Kind"></td></tr>
                            <tr class = "choice"><td class = "choiceP">full house</td><td class = "choiceScoreP" id = "fullHouse"></td></tr>
                            <tr class = "choice"><td class = "choiceP">small str.</td><td class = "choiceScoreP" id = "smallStr"></td></tr>
                            <tr class = "choice"><td class = "choiceP">large str.</td><td class = "choiceScoreP" id = "largeStr"></td></tr>
                            <tr class = "choice"><td class = "choiceP">Chance</td><td class = "choiceScoreP" id = "chance"></td></tr>
                    </tbody>
                </table>
            </div>
            <div class = "board">
            </div>
            <div class = "diceRoll">
                <div onclick = "hold(this)" class = "1 free" id = "dice1"><p id = "diceP1"></p></div>
                <div onclick = "hold(this)" class = "2 free" id = "dice2"><p id = "diceP2"></p></div>
                <div onclick = "hold(this)" class = "3 free" id = "dice3"><p id = "diceP3"></p></div>
                <div onclick = "hold(this)" class = "4 free" id = "dice4"><p id = "diceP4"></p></div>
                <div onclick = "hold(this)" class = "5 free" id = "dice5"><p id = "diceP5"></p></div>
            </div>
            <div class = "controls">
                <button onclick = "roll()">roll</button>
                <p id = "rollsNum">rolls: 3</p>
            </div>
        </div>
        <script src = "script.js"></script>
    </body>
</html>
